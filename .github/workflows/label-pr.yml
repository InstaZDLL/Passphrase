name: Label PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: label-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Path-based labels
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          sync-labels: true

      - name: Type labels from PR title
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = context.payload.pull_request.title;
            const prefixMap = {
              feat: 'enhancement',
              fix: 'bug',
              docs: 'documentation',
              refactor: 'refactor',
              perf: 'performance',
              ci: 'area: ci',
            };

            const match = title.match(/^(\w+)(\(.+\))?[!]?:/);
            const prefix = match?.[1];
            const label = prefixMap[prefix];

            if (label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            }

      - name: Size labels from diff
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const lines = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);
            const sizeLabels = [
              { max: 10, label: 'size: xs' },
              { max: 50, label: 'size: s' },
              { max: 200, label: 'size: m' },
              { max: 500, label: 'size: l' },
            ];
            const sizeLabel = sizeLabels.find(s => lines <= s.max)?.label || 'size: xl';

            const current = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const l of current.data.filter(l => l.name.startsWith('size:'))) {
              if (l.name !== sizeLabel) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: l.name,
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [sizeLabel],
            });
