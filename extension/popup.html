<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Passphrase</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="brand">
        <svg
          class="brand__mark"
          viewBox="0 0 512 512"
          aria-hidden="true"
          focusable="false"
        >
          <defs>
            <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#263443" />
              <stop offset="100%" stop-color="#111827" />
            </linearGradient>
            <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e77b54" />
              <stop offset="100%" stop-color="#d96541" />
            </linearGradient>
          </defs>
          <rect width="512" height="512" rx="128" fill="url(#bg)" />
          <path
            d="M 130 116 H 260 A 120 120 0 0 1 260 356 H 190 V 396 H 130 Z"
            fill="#ffffff"
          />
          <circle cx="260" cy="236" r="46" fill="url(#accent)" />
        </svg>
        <div class="brand__text">
          <p class="brand__name">Passphrase</p>
          <p class="brand__tag">Générateur français</p>
        </div>
      </header>

      <section class="results" aria-live="polite" aria-busy="false">
        <div class="results__list" id="result"></div>
        <div class="results__loader" id="loader" hidden>
          <span class="loader-dot"></span>
          <span>Génération…</span>
        </div>
        <p class="results__error" id="error" hidden></p>
      </section>

      <button id="generate" class="btn btn--primary" type="button">
        Générer 5 passphrases
      </button>

      <details class="settings">
        <summary>
          <span>Personnalisation</span>
          <svg
            class="settings__chevron"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M6 9l6 6 6-6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </summary>

        <div class="settings__grid">
          <label class="field">
            <span>Nombre de mots</span>
            <select id="nb_mots">
              <option value="2" selected>2 mots</option>
              <option value="3">3 mots</option>
              <option value="4">4 mots</option>
              <option value="5">5 mots</option>
              <option value="6">6 mots</option>
              <option value="7">7 mots</option>
            </select>
          </label>

          <label class="field">
            <span>Séparateur</span>
            <select id="separateur">
              <option value="random" selected>Aléatoire</option>
              <option value="-">Tiret (-)</option>
              <option value="_">Underscore (_)</option>
              <option value=" ">Espace</option>
              <option value="*">Étoile (*)</option>
              <option value="/">Slash (/)</option>
              <option value="+">Plus (+)</option>
            </select>
          </label>

          <label class="field">
            <span>Chiffres finaux</span>
            <select id="longueur_nombre">
              <option value="0">0 chiffre</option>
              <option value="1">1 chiffre</option>
              <option value="2" selected>2 chiffres</option>
              <option value="3">3 chiffres</option>
              <option value="4">4 chiffres</option>
              <option value="5">5 chiffres</option>
            </select>
          </label>

          <label class="field">
            <span>Caractère final</span>
            <select id="caractere_special">
              <option value="random" selected>Aléatoire</option>
              <option value="none">Aucun</option>
              <option value="$">Dollar ($)</option>
              <option value="!">Exclamation (!)</option>
              <option value="#">Croisillon (#)</option>
              <option value="?">Interrogation (?)</option>
              <option value="-">Tiret (-)</option>
              <option value="+">Plus (+)</option>
              <option value="@">Arobase (@)</option>
              <option value=",">Virgule (,)</option>
              <option value=";">Point-virgule (;)</option>
              <option value=":">Deux-points (:)</option>
              <option value="*">Étoile (*)</option>
            </select>
          </label>

          <label class="field field--wide">
            <span>Longueur minimale</span>
            <input id="longueur_minimale" type="number" min="8" max="50" value="12" />
          </label>
        </div>

        <div class="toggles">
          <label class="toggle">
            <input type="checkbox" id="majuscule_debut" checked />
            <span>Majuscule en début de mot</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="majuscule_aleatoire" />
            <span>Majuscule aléatoire</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="caracteres_accentues" checked />
            <span>Conserver les accents</span>
          </label>
        </div>

        <button id="reset" class="btn btn--ghost" type="button">
          Réinitialiser
        </button>
      </details>

      <footer class="footer">
        <a href="https://www.passphrase.ch" target="_blank" rel="noopener noreferrer">
          passphrase.ch
        </a>
        <span>·</span>
        <a
          href="https://github.com/InstaZDLL/Passphrase"
          target="_blank"
          rel="noopener noreferrer"
        >
          GitHub
        </a>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
