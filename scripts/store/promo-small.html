<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800&display=swap"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; width: 440px; height: 280px; overflow: hidden; font-family: "Manrope", system-ui, sans-serif; }
      body {
        background:
          radial-gradient(circle at 15% 30%, rgba(231, 123, 84, 0.25), transparent 50%),
          radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.18), transparent 50%),
          linear-gradient(135deg, #111827 0%, #1f2933 100%);
        color: #ffffff;
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 30px;
      }
      .mark { width: 80px; height: 80px; flex-shrink: 0; }
      h1 {
        font-family: "Fraunces", "Times New Roman", serif;
        font-size: 32px;
        line-height: 1.05;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
      }
      .accent { color: #e77b54; }
      p { font-size: 14px; color: rgba(255, 255, 255, 0.75); margin: 0; line-height: 1.4; }
    </style>
  </head>
  <body>
    <svg class="mark" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#263443" />
          <stop offset="100%" stop-color="#111827" />
        </linearGradient>
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e77b54" />
          <stop offset="100%" stop-color="#d96541" />
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="128" fill="url(#bg)" stroke="rgba(255,255,255,0.1)" stroke-width="6" />
      <path d="M 130 116 H 260 A 120 120 0 0 1 260 356 H 190 V 396 H 130 Z" fill="#ffffff" />
      <circle cx="260" cy="236" r="46" fill="url(#accent)" />
    </svg>
    <div>
      <h1>Passphrases<br /><span class="accent">françaises</span></h1>
      <p>Mémorisables.<br />Toujours costaudes.</p>
    </div>
  </body>
</html>
